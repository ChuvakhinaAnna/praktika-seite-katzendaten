<!Doctype html>

<head>
  <meta charset="utf-8">
  <title>Ausgabe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: "Google Sans Flex", sans-serif;
      font-optical-sizing: auto;
      font-weight: weight 400;
      font-style: normal;
      font-variation-settings:
        "slnt" 0,
        "wdth" 100,
        "GRAD" 0,
        "ROND" 0;
      color: #1e1e1e;
    }

    

    h1 {
      color: #3c7385;
    }

    h3 {
      color: #1f1f1f;
    }

    /* zu den schriften: */
    @media (min-width: 1200px) {
      h1 {
        font-size: 64px;
      }

      h3 {
        font-size: 40px;
      }
    }


    @media (min-width: 1000px) {
      h1 {
        font-size: 50px;
      }

      h3 {
        font-size: 30px;
      }
    }


    @media (min-width: 750px) {
      h1 {
        font-size: 36px;
      }

      h3 {
        font-size: 20px;
      }
    }


    .flex-container {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      align-content: flex-start;
      gap: 1px;
    }

    .flex-item:nth-child(1) {
      align-self: stretch;
    }

    .flex-item:nth-child(2) {
      align-self: stretch;
    }

    .flex-item:nth-child(3) {
      align-self: stretch;
    }



    /* tabelle */
    div.container {
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 15%;
      height: 15%;
      font-size: 9px;
    }

    /* kopfspalte tabelle */
    table,
    th,
    td {
      border: 1px solid #c0cfe0;
      padding: 8px;
      text-align: middle;
    }

    tr:hover {
      background-color: #f3fbff;
    }

    th {
      background-color: #85c8df;
    }


    /* suchfeld */
    .userinfo label[for="searchId"] {
      font-weight: 200;
      color: #f1f1f1;
      margin-right: 8px;
    }

    input[type=text],
    select {
      width: 50%;
      min-height: 10px;
      margin-bottom: 5px;
      border: 1px solid #e3e5ec;
      border-radius: 5px;
      background-color: #f3fbff;
      padding: 8px;
    }

    /* finden + entfernen Buttons */
    button {
      padding: 8px;
      border-radius: 5px;
      background-color: #75b5ca;
      color: #ffffff;
      border: 1px solid #6e98b4;
      cursor: pointer;
      vertical-align: middle;
      margin-bottom: 5px;
      width: 15%;
      font-size: 12px;
    }

    #findBtn {
      background-color: #3c7385;
      border: 1px solid #2e5a6b;
    }

    #findBtn:hover {
      background-color: #52dfdf;
      transition: background-color 0.2s ease;
    }

    #deleteBtn {
      background-color: #d9534f;
      border: 1px solid #4d1010;
      color: #ffffff;
    }

    #deleteBtn:hover {
      background-color: #ffd153;
      transition: background-color 0.2s ease;
    }

    #zürückBtn {
      background-color: #3c7385;
      border: 1px solid #2e5a6b;
    }

    #zürückBtn:hover {
      background-color: #52dfdf;
      transition: background-color 0.2s ease;
    }



    /* bildschirm x zu der tabelle, usw. */
    @media (min-width: 1200px) {
      table {
        border-collapse: collapse;
        width: 75%;
        font-size: 30px;
      }

      .userinfo label[for="searchId"] {
        font-weight: 200;
      }

      input[type=text],
      select {
        padding: 10px;
        min-width: 75%;
        min-height: 15px;
      }

      button {
        min-width: 80%;
        min-height: 30px;
      }

      .flex-container {
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: flex-end;
        align-items: stretch;
        align-content: stretch;
      }

      .flex-item:nth-child(3) {
        align-self: flex-start;
      }

      .flex-item:nth-child(4) {
        align-self: flex-end;
      }

      .flex-item:nth-child(5) {
        align-self: flex-end;
      }

      .flex-item:nth-child(6) {
        align-self: flex-end;
      }

      .flex-item:nth-child(7) {
        flex-grow: 1;
        align-self: flex-end;
      }
    }

    @media (min-width: 1000px) {

      input[type=text],
      select {
        min-width: 65%;
      }

      button {
        width: 9%;
      }

      table {
        width: 100%;
        font-size: 16px;
      }
    }

    @media (min-width: 750px) {

      input[type=text],
      select {
        min-width: 75%;
      }

      button {
        width: 10%;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 10px;
      }
    }
  </style>

</head>

<body>
  <div class="flex-container">
    <div class="flex-item">

      <button type="button" id="zürückBtn">Zürück</button>

      <h1>Ausgabe gespeicherte Einträge:</h1>

      <div class="container">
        <form action="#" method="post" id="userinfo">
          <label for="searchId">
            <h3><b>Nutzer-ID:</b></h3>
          </label>
          <input type="text" id="searchId" name="searchId" placeholder="Nutzer-ID eingeben">
          <button type="button" id="findBtn">Finden</button>
          <button type="button" id="deleteBtn">Entfernen</button>
        </form>
      </div>

    </div>
    <table id="resultsTable" border="1">
      <thead>
        <div class="flex-item">
          <th>Name</th>
        </div>
        <div class="flex-item">
          <th>Nachname</th>
        </div>
        <div class="flex-item">
          <th>E-Mail</th>
        </div>
        <div class="flex-item">
          <th>Telefon</th>
        </div>
        <div class="flex-item">
          <th>Nutzer-ID</th>
        </div>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Lade Daten...</td>
        </tr>
      </tbody>
    </table>
  </div>



  <!-- hot tasten auskommentieren: strg + k und direkt danach + c  -->



  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://fsyvdrghcmqjrkhqjtlp.supabase.co',
      'sb_publishable_9z6rxBNsROtHlycOmfsvgQ_lsN74a6_'
    );

    async function loadData() {
      const { data, error } = await supabase
        .from('Nutzereingaben')
        .select();

      const table = document.querySelector('#resultsTable tbody');

      if (error) {
        console.error('Fehler beim Laden:', error);
        if (table) {
          table.innerHTML = '<tr><td colspan="4">Fehler beim Laden der Daten.</td></tr>';
        }
        return;
      }
      console.log('Geladene Daten:', data);

      if (!table) return;
      if (!data || data.length === 0) {
        table.innerHTML = '<tr><td colspan="4">Keine Einträge.</td></tr>';
        return;
      }

      table.innerHTML = data.map(row => `\n      <tr>\n        <td>${row.name || ''}</td>\n        <td>${row.nachname || ''}</td>\n        <td>${row.email || ''}</td>\n        <td>${row.telefon || ''}</td>\n     <td>${row.id || ''}</td>\n      </tr>`).join('');
    }

    loadData();

    // user finden + daten anzeigen
    async function findUserById() {
      const idInput = document.getElementById('searchId');
      const tableBody = document.querySelector('#resultsTable tbody');
      if (!idInput || !tableBody) return;
      const id = idInput.value.trim();

      try {
        const { data, error } = await supabase
          .from('Nutzereingaben')
          .select('name,nachname,email,telefon,id')
          .eq('id', id)
          .single();

        if (error) {
          console.error('Fehler beim Finden:', error);
          tableBody.innerHTML = '<tr><td colspan="5">Kein Nutzer für diese ID gefunden.</td></tr>';
          return;
        }

        if (!data) {
          tableBody.innerHTML = '<tr><td colspan="5">Kein Eintrag für diese Nutzer-ID gefunden.</td></tr>';
          return;
        }

        tableBody.innerHTML = `\n      <tr>\n        <td>${data.name || ''}</td>\n        <td>${data.nachname || ''}</td>\n        <td>${data.email || ''}</td>\n        <td>${data.telefon || ''}</td>\n        <td>${data.id || ''}</td>\n      </tr>`;
      } catch (err) {
        console.error('Unerwarteter Fehler:', err);
        tableBody.innerHTML = '<tr><td colspan="5">Unerwarteter Fehler.</td></tr>';
      }
    }

    const findBtn = document.getElementById('findBtn');
    if (findBtn) findBtn.addEventListener('click', findUserById);



    // user entfernen + tablle aktualisieren
    async function deleteUserById() {
      const idInput = document.getElementById('searchId');
      const tableBody = document.querySelector('#resultsTable tbody');
      if (!idInput || !tableBody) return;
      const id = idInput.value.trim();

      try {
        const { data, error } = await supabase
          .from('Nutzereingaben')
          .delete()
          .eq('id', id)
          .single();

        if (error) {
          console.error('Fehler beim Löschen:', error);
          tableBody.innerHTML = '<tr><td colspan="5">Kein Nutzer für diese ID gefunden.</td></tr>';
          return;
        }

        // nutzer gelöscht -> tabelle neu laden
        loadData();
        idInput.value = '';
      } catch (err) {
        console.error('Unerwarteter Fehler beim Löschen:', err);
        tableBody.innerHTML = '<tr><td colspan="5">Unerwarteter Fehler.</td></tr>';
      }
    }

    const deleteBtn = document.getElementById('deleteBtn');
    if (deleteBtn) deleteBtn.addEventListener('click', deleteUserById);

    // Enter für finden
    document.getElementById('searchId')?.addEventListener('keydown', e => e.key === 'Enter' && (e.preventDefault(), findUserById()));

    // zurück
    const backBtn = document.getElementById('zürückBtn');
    if (backBtn) {
      backBtn.addEventListener('click', e => {
        e.preventDefault();
        location.href = 'Nutzereingaben.html';
      });
    }
  </script>
</body>

</html>
